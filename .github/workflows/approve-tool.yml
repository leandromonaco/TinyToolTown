name: Queue Tool Submission

on:
  issues:
    types: [labeled]

jobs:
  queue-import:
    if: github.event.label.name == 'approved' && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write
      contents: read
    steps:
      - name: Queue approved issue for batch import
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(l => l.name);

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } else {
                  throw err;
                }
              }
            }

            await ensureLabel('queued-import', '0e8a16', 'Queued for batch import into site content');
            await ensureLabel('import-failed', 'd73a4a', 'Batch import failed and needs maintainer attention');

            if (!labels.includes('queued-import')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['queued-import'],
              });
              console.log(`#${issue.number} queued for import`);
            } else {
              console.log(`#${issue.number} already queued`);
            }

            if (labels.includes('import-failed')) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'import-failed',
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            }

            // Kick off queue processing unless one is already running/queued.
            const running = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'batch-approve.yml',
              status: 'in_progress',
              per_page: 1,
            });
            const queued = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'batch-approve.yml',
              status: 'queued',
              per_page: 1,
            });

            if ((running.data.total_count || 0) === 0 && (queued.data.total_count || 0) === 0) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'batch-approve.yml',
                ref: 'main',
              });
              console.log('Dispatched batch-approve queue processor');
            } else {
              console.log('Queue processor already running or queued');
            }
