name: Process Import Queue

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Number of queued issues to process (1-100)
        required: false
        default: "25"
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: tool-file-writer
  cancel-in-progress: false

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Process queued issues in one batch
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const sharp = require('sharp');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const inputBatch = core.getInput('batch_size');
            const batchSize = Math.max(1, Math.min(100, parseInt(inputBatch || '25', 10) || 25));

            const sanitize = (s) => (s || '')
              .replace(/[\r\n]+/g, ' ')
              .replace(/[^\x20-\x7E\xA0-\uFFFF]/g, '')
              .trim();
            const yamlStr = (s) => `"${sanitize(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"`;

            const sanitizeHtml = (s) => {
              let clean = s || '';
              for (let i = 0; i < 3; i++) {
                const prev = clean;
                clean = clean.replace(/<[^>]*>/g, '');
                clean = clean.replace(/&lt;/gi, '<').replace(/&gt;/gi, '>').replace(/&amp;/gi, '&');
                clean = clean.replace(/<[^>]*>/g, '');
                if (clean === prev) break;
              }
              return clean;
            };

            const badgeHosts = [
              'img.shields.io', 'badge.fury.io', 'badgen.net', 'badges.', 'coveralls.io',
              'codecov.io', 'travis-ci.', 'ci.appveyor.com', 'github.com/workflows',
            ];
            const isBadge = (u) => badgeHosts.some(h => u.includes(h)) || u.includes('/badge');

            const MIN_IMAGE_SIZE = 10 * 1024;
            const MAX_SOURCE_IMAGE_SIZE = 60 * 1024 * 1024;
            const STATIC_MAX_WIDTH = 960;
            const STATIC_MAX_HEIGHT = 540;
            const ANIMATED_MAX_WIDTH = 480;
            const ANIMATED_MAX_HEIGHT = 270;
            const MAX_ANIMATED_OUTPUT_SIZE = 900 * 1024;

            const getField = (body, label) => {
              const regex = new RegExp(`### ${label}\\s*\\n*\\s*([\\s\\S]*?)(?=\\n###|\\n\\n###|$)`);
              const match = (body || '').match(regex);
              return match ? match[1].trim() : '';
            };

            const sleep = (ms) => Atomics.wait(new Int32Array(new SharedArrayBuffer(4)), 0, 0, ms);

            async function optimizeThumbnailBuffer(inputBuffer) {
              const metadata = await sharp(inputBuffer, { animated: true, pages: -1, failOn: 'none', limitInputPixels: false }).metadata();
              const isAnimated = (metadata.pages || 1) > 1;

              if (isAnimated) {
                try {
                  const animatedBuffer = await sharp(inputBuffer, { animated: true, pages: -1, failOn: 'none', limitInputPixels: false })
                    .rotate()
                    .resize({
                      width: ANIMATED_MAX_WIDTH,
                      height: ANIMATED_MAX_HEIGHT,
                      fit: 'inside',
                      withoutEnlargement: true,
                    })
                    .gif({
                      effort: 5,
                      colours: 96,
                    })
                    .toBuffer();

                  if (animatedBuffer.length <= MAX_ANIMATED_OUTPUT_SIZE) {
                    return { buffer: animatedBuffer, ext: '.gif' };
                  }
                } catch {
                  // Fall back to a static preview when animated encoding is unavailable.
                }
              }

              const staticBuffer = await sharp(inputBuffer, { animated: true, pages: 1, failOn: 'none', limitInputPixels: false })
                .rotate()
                .resize({
                  width: STATIC_MAX_WIDTH,
                  height: STATIC_MAX_HEIGHT,
                  fit: 'inside',
                  withoutEnlargement: true,
                })
                .webp({
                  quality: 78,
                  effort: 5,
                })
                .toBuffer();

              return { buffer: staticBuffer, ext: '.webp' };
            }

            function removeStaleThumbnails(slug, keepFile) {
              const thumbsDir = 'public/thumbnails';
              if (!fs.existsSync(thumbsDir)) return;

              for (const file of fs.readdirSync(thumbsDir)) {
                if (!file.startsWith(`${slug}.`)) continue;
                if (file === keepFile) continue;
                fs.unlinkSync(path.join(thumbsDir, file));
              }
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } else {
                  throw err;
                }
              }
            }

            async function removeLabelIfExists(issueNumber, name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            }

            async function markFailed(issueNumber, reason, removeFromQueue = true) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['import-failed'],
              });
              if (removeFromQueue) {
                await removeLabelIfExists(issueNumber, 'queued-import');
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `⚠️ Import failed: ${reason}\n\nA maintainer can re-queue this by adding the \`approved\` label again.`,
              });
            }

            await ensureLabel('import-failed', 'd73a4a', 'Batch import failed and needs maintainer attention');

            const queuedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: 'queued-import',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 100,
            });

            const issues = queuedIssues.slice(0, batchSize);
            if (issues.length === 0) {
              console.log('No queued issues to process');
              return;
            }

            console.log(`Processing ${issues.length} queued issue(s)`);

            execFileSync('git', ['config', 'user.name', 'Tiny Tool Town Bot']);
            execFileSync('git', ['config', 'user.email', 'bot@tinytooltown.com']);

            const processed = [];
            const failed = [];

            for (const issue of issues) {
              try {
                const body = issue.body || '';

                const name = getField(body, 'Tool Name');
                const tagline = getField(body, 'One-line description');
                const description = getField(body, 'Tell us about your tool');
                let github_url = getField(body, 'GitHub Repository URL');
                const website_url = getField(body, 'Website or Demo URL \\(optional\\)');
                const author = getField(body, 'Your Name');
                const author_github = getField(body, 'Your GitHub Username');
                const tagsRaw = getField(body, 'Tags \\(comma-separated\\)');
                const language = getField(body, 'Primary Programming Language');
                const license = getField(body, 'License');
                const theme = getField(body, 'Page Theme \\(optional\\)');

                if (!name || !tagline || !github_url || !author || !author_github) {
                  throw new Error('Missing required fields');
                }

                github_url = github_url.replace('://www.github.com/', '://github.com/');
                if (!/^https:\/\/github\.com\/[a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+(\/.*)?$/.test(github_url)) {
                  throw new Error('GitHub URL is invalid');
                }

                const slug = sanitize(name).toLowerCase()
                  .replace(/[^a-z0-9]+/g, '-')
                  .replace(/^-|-$/g, '');
                if (!slug || slug.length < 2) {
                  throw new Error('Generated slug is invalid');
                }

                const filePath = `src/content/tools/${slug}.md`;
                if (fs.existsSync(filePath)) {
                  throw new Error(`Slug collision: ${slug}.md already exists`);
                }

                const repoMatch = github_url.match(/github\.com\/([^/]+)\/([^/]+)/);
                if (repoMatch) {
                  const repoOwner = repoMatch[1];
                  const repoName = repoMatch[2].replace(/\/$/, '');
                  const { data: repoData } = await github.rest.repos.get({ owner: repoOwner, repo: repoName });
                  if (repoData.private) {
                    throw new Error('Repository is private');
                  }
                }

                // Clean website_url: strip HTML tags and normalize empty/no-response values
                let website_url_clean = (website_url || '').replace(/<[^>]*>/g, '').trim();
                if (!website_url_clean || website_url_clean === '_No response_') {
                  website_url_clean = '';
                }
                if (website_url_clean && !/^https?:\/\/.+/.test(website_url_clean)) {
                  throw new Error('Website URL is invalid');
                }

                const tagSynonyms = {
                  'devtools': 'developer-tools',
                  'dev-tools': 'developer-tools',
                  'system tray': 'system-tray',
                  'ui': 'web',
                  'webapp': 'web',
                  'funny': 'fun',
                  'silly': 'fun',
                  'trains': 'train',
                  'games': 'game',
                  'presentations': 'presentation',
                  'audio profiles': 'audio',
                  'internet radio': 'radio',
                  'key bindings': 'keyboard',
                  'copilot cli': 'copilot',
                };
                const langTags = [
                  'c#', 'csharp', 'c++', 'rust', 'typescript', 'javascript', 'python', 'powershell',
                  'go', 'ruby', 'java', 'swift', 'nim', 'html', 'css', 'xaml', 'shell', 'bash', 'ts', 'js',
                ];
                const tags = (tagsRaw || '')
                  .split(/[,;]+/)
                  .map(t => {
                    let tag = sanitize(t).toLowerCase();
                    if (tagSynonyms[tag]) tag = tagSynonyms[tag];
                    return tag;
                  })
                  .filter(t => t && !langTags.includes(t))
                  .slice(0, 5);

                const today = new Date().toISOString().split('T')[0];
                const lines = [
                  '---',
                  `name: ${yamlStr(name)}`,
                  `tagline: ${yamlStr(tagline)}`,
                  `author: ${yamlStr(author)}`,
                  `author_github: "${sanitize(author_github).replace(/[^a-zA-Z0-9_-]/g, '')}"`,
                  `github_url: ${yamlStr(github_url)}`,
                ];
                if (website_url_clean) {
                  lines.push(`website_url: ${yamlStr(website_url_clean)}`);
                }
                lines.push(`tags: [${tags.map(t => `"${t.replace(/"/g, '')}"`).join(', ')}]`);
                if (language && language !== '_No response_') {
                  lines.push(`language: "${sanitize(language).replace(/"/g, '')}"`);
                }
                if (license && license !== '_No response_') {
                  lines.push(`license: "${sanitize(license).replace(/"/g, '')}"`);
                }
                if (theme && theme !== '_No response_' && theme !== 'None (site default)' && theme !== 'None') {
                  lines.push(`theme: "${sanitize(theme).replace(/"/g, '')}"`);
                }
                lines.push(`date_added: "${today}"`);
                lines.push('featured: false');
                lines.push('---');
                lines.push('');
                lines.push(sanitizeHtml(description));
                fs.writeFileSync(filePath, lines.join('\n'));

                // Thumbnail extraction
                const repoClean = github_url.replace(/\/$/, '');
                const repoOwner = repoClean.split('/')[3];
                const repoName = repoClean.split('/')[4];
                let thumbPath = null;

                const comments = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issue.number,
                });

                let imageFromComment = null;
                for (const comment of comments.data) {
                  const commentBody = comment.body || '';
                  // Match markdown images: ![alt](url) or HTML images: <img ... src="url" ...>
                  const mdImg = commentBody.match(/!\[[^\]]*\]\((https?:\/\/[^)]+)\)/);
                  const htmlImg = commentBody.match(/<img[^>]+src=["'](https?:\/\/[^"']+)["']/i);
                  const uploadedImg = mdImg || htmlImg;
                  if (uploadedImg) {
                    imageFromComment = uploadedImg[1];
                    break;
                  }
                }

                if (imageFromComment) {
                  try {
                    const imgRes = await fetch(imageFromComment);
                    if (imgRes.ok) {
                      const contentLen = parseInt(imgRes.headers.get('content-length') || '0', 10);
                      if (contentLen <= MAX_SOURCE_IMAGE_SIZE || contentLen === 0) {
                        const buf = Buffer.from(await imgRes.arrayBuffer());
                        if (buf.length >= MIN_IMAGE_SIZE && buf.length <= MAX_SOURCE_IMAGE_SIZE) {
                          const optimized = await optimizeThumbnailBuffer(buf);
                          const thumbFile = `${slug}${optimized.ext}`;
                          const thumbDest = `public/thumbnails/${thumbFile}`;
                          if (!fs.existsSync('public/thumbnails')) fs.mkdirSync('public/thumbnails', { recursive: true });
                          removeStaleThumbnails(slug, thumbFile);
                          fs.writeFileSync(thumbDest, optimized.buffer);
                          thumbPath = `/thumbnails/${thumbFile}`;
                        }
                      }
                    }
                  } catch (e) {
                    console.log(`Comment image failed for #${issue.number}: ${e.message}`);
                  }
                }

                if (!thumbPath) {
                  for (const branch of ['main', 'master']) {
                    try {
                      const readmeRes = await fetch(`https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/README.md`);
                      if (!readmeRes.ok) continue;
                      const readme = await readmeRes.text();

                      const mdImgs = [...readme.matchAll(/!\[[^\]]*\]\(([^)]+)\)/g)]
                        .map(m => m[1])
                        .filter(u => !isBadge(u));
                      const htmlImgs = [...readme.matchAll(/<img[^>]+src=["']([^"']+)["']/gi)]
                        .map(m => m[1])
                        .filter(u => !isBadge(u));
                      const topImages = [...mdImgs, ...htmlImgs].slice(0, 5);
                      if (topImages.length === 0) break;

                      const imageCandidates = [];
                      for (const imgPath of topImages) {
                        try {
                          let imgUrl = imgPath;
                          if (!imgPath.startsWith('http')) {
                            imgUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${imgPath.replace(/^\.\//, '')}`;
                          }
                          const imgRes = await fetch(imgUrl);
                          if (!imgRes.ok) continue;
                          const contentLen = parseInt(imgRes.headers.get('content-length') || '0', 10);
                          if (contentLen > MAX_SOURCE_IMAGE_SIZE) continue;
                          const buf = Buffer.from(await imgRes.arrayBuffer());
                          if (buf.length >= MIN_IMAGE_SIZE && buf.length <= MAX_SOURCE_IMAGE_SIZE) {
                            imageCandidates.push({ url: imgUrl, size: buf.length, buffer: buf });
                          }
                        } catch {
                          // Continue on image errors
                        }
                      }

                      if (imageCandidates.length === 0) break;
                      imageCandidates.sort((a, b) => b.size - a.size);
                      const bestImage = imageCandidates[0];
                      const optimized = await optimizeThumbnailBuffer(bestImage.buffer);
                      const thumbFile = `${slug}${optimized.ext}`;
                      const thumbDest = `public/thumbnails/${thumbFile}`;
                      if (!fs.existsSync('public/thumbnails')) fs.mkdirSync('public/thumbnails', { recursive: true });
                      removeStaleThumbnails(slug, thumbFile);
                      fs.writeFileSync(thumbDest, optimized.buffer);
                      thumbPath = `/thumbnails/${thumbFile}`;
                      break;
                    } catch (e) {
                      console.log(`README image scan failed for #${issue.number}: ${e.message}`);
                    }
                  }
                }

                if (thumbPath) {
                  const updated = fs.readFileSync(filePath, 'utf-8').replace(
                    /(github_url:.*\n)/,
                    `$1thumbnail: "${thumbPath}"\n`,
                  );
                  fs.writeFileSync(filePath, updated);
                }

                processed.push({
                  issueNumber: issue.number,
                  name: sanitize(name),
                  slug,
                });
                console.log(`Prepared #${issue.number}: ${name}`);
              } catch (err) {
                const reason = err.message || 'Unknown error';
                failed.push({ issueNumber: issue.number, reason });
                console.log(`Failed #${issue.number}: ${reason}`);
                await markFailed(issue.number, reason, true);
              }
            }

            let pushed = false;
            if (processed.length > 0) {
              execFileSync('git', ['add', 'src/content/tools']);
              if (fs.existsSync('public/thumbnails')) {
                execFileSync('git', ['add', 'public/thumbnails']);
              }

              let hasChanges = true;
              try {
                execFileSync('git', ['diff', '--cached', '--quiet']);
                hasChanges = false;
              } catch {
                hasChanges = true;
              }

              if (hasChanges) {
                const commitTitle = `🏘️ Add ${processed.length} tool${processed.length === 1 ? '' : 's'} from import queue`;
                execFileSync('git', ['commit', '-m', commitTitle]);

                for (let attempt = 0; attempt < 5; attempt++) {
                  try {
                    execFileSync('git', ['push']);
                    pushed = true;
                    break;
                  } catch (err) {
                    if (attempt === 4) throw err;
                    try {
                      execFileSync('git', ['pull', '--rebase']);
                    } catch {
                      // If pull fails, next push attempt may still recover.
                    }
                    const backoffMs = Math.min(30000, (2 ** (attempt + 1)) * 1000) + Math.floor(Math.random() * 500);
                    sleep(backoffMs);
                  }
                }
              }
            }

            if (processed.length > 0 && pushed) {
              // Trigger deploy — GITHUB_TOKEN pushes don't trigger other workflows
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'deploy.yml',
                ref: 'main',
              });
              console.log('Triggered deploy workflow');

              for (const item of processed) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: item.issueNumber,
                  body: `🏘️ **Welcome to Tiny Tool Town!**\n\n**${item.name}** has been added and will be live on [tinytooltown.com](https://www.tinytooltown.com/tools/${item.slug}/) once the site rebuilds.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: item.issueNumber,
                  state: 'closed',
                });
              }
            } else if (processed.length > 0 && !pushed) {
              for (const item of processed) {
                await markFailed(item.issueNumber, 'Git push failed after retries', false);
              }
            }

            console.log(`Done. Prepared: ${processed.length}, Failed: ${failed.length}, Pushed: ${pushed}`);

      - name: Write summary
        run: |
          echo "Processed queued import batch."
