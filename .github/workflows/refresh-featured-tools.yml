name: Refresh Featured Tools

on:
  schedule:
    - cron: '0 14 * * 1'  # Mondays at 14:00 UTC
  workflow_dispatch:

concurrency:
  group: featured-tools-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Refresh featured tool selection
        run: node scripts/refresh-featured-tools.mjs

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- src/content/tools .github/featured-history.json; then
            echo "No featured changes to propose."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="automation/refresh-featured-tools"
          git checkout -B "$branch"
          git add src/content/tools .github/featured-history.json
          git commit -m "chore: refresh featured tools"
          git push --force-with-lease --set-upstream origin "$branch"

          pr_number=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open --json number --jq '.[0].number')

          pr_body=$(cat <<'EOF'
          ## Weekly featured tool refresh

          This PR was generated automatically by the scheduled featured-tools workflow.

          It refreshes the homepage featured set using:
          - thumbnail presence
          - recent additions
          - GitHub stars
          - language/tag diversity
          - cooldown history to avoid featuring the same tools every week

          Pinned tools remain included until removed from `.github/featured-tools-config.json`.
          EOF
          )

          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            set +e
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" \
              --title "chore: refresh featured tools" \
              --body "$pr_body"
            status=$?
            set -e

            if [ $status -ne 0 ]; then
              echo "GitHub Actions could not edit the existing PR metadata, but the branch was updated successfully."
            fi
          else
            set +e
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "chore: refresh featured tools" \
              --body "$pr_body"
            status=$?
            set -e

            if [ $status -ne 0 ]; then
              compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
              echo "GitHub Actions could not create the PR automatically. Review the branch here: $compare_url"
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                {
                  echo "## Featured tools branch ready"
                  echo
                  echo "GitHub Actions pushed the refresh branch, but repo settings blocked automatic PR creation."
                  echo
                  echo "- Branch: \`$branch\`"
                  echo "- Compare URL: $compare_url"
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
