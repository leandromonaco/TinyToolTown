name: Refresh Star Counts

on:
  schedule:
    - cron: '0 6,18 * * *'  # Twice daily: 6am and 6pm UTC
  workflow_dispatch:

concurrency:
  group: tool-file-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Refresh star counts cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/refresh-stars.mjs

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/star-counts.json
          if git diff --cached --quiet; then
            echo "No changes to star counts cache."
          else
            git commit -m "chore: refresh star counts cache"
            git push
          fi
