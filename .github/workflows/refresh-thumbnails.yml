name: Refresh Thumbnails

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 4am UTC
  workflow_dispatch:

concurrency:
  group: tool-file-writer
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Refresh all tool thumbnails
        run: |
          npm ci
          node scripts/fetch-thumbnails.mjs

      - name: Commit and push changes
        run: |
          git config user.name "Tiny Tool Town Bot"
          git config user.email "bot@tinytooltown.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No thumbnail changes detected"
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "🖼️ Refresh thumbnails ($CHANGED files updated)"
            PUSHED=false
            for i in 1 2 3 4 5; do
              if git push origin main; then
                PUSHED=true
                break
              fi
              echo "⚠️ Push failed (attempt $i), pulling and retrying..."
              git pull --rebase origin main || true
              sleep $((i * 2))
            done
            if [ "$PUSHED" != "true" ]; then
              echo "❌ Push failed after retries"
              exit 1
            fi
          fi

      - name: Trigger site rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
