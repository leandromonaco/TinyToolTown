name: Triage Tool Submission

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to retriage (leave empty for all open new-tool issues)'
        required: false
        type: string

jobs:
  triage:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'new-tool') ||
      startsWith(github.event.issue.title, '[Tool]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Triage submission
        uses: actions/github-script@v7
        with:
          script: |
            const isManual = context.eventName === 'workflow_dispatch';
            let issuesToTriage = [];

            if (context.eventName === 'issue_comment') {
              const issueState = context.payload.issue?.state;
              const commentAuthor = context.payload.comment?.user?.login;
              if (issueState !== 'open' || commentAuthor === 'github-actions[bot]') {
                console.log(`Skipping issue_comment retriage (state: ${issueState}, author: ${commentAuthor})`);
                return;
              }
            }

            if (isManual) {
              const inputNum = '${{ github.event.inputs.issue_number }}'.trim();
              if (inputNum) {
                // Retriage a specific issue
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(inputNum)
                });
                issuesToTriage.push(issue);
              } else {
                // Retriage all open new-tool issues
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: 'new-tool',
                  state: 'open',
                  per_page: 100,
                });
                issuesToTriage = issues;
              }
            } else {
              issuesToTriage.push(context.payload.issue);
            }

            console.log(`📋 Triaging ${issuesToTriage.length} issue(s)`);

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description });
                } else throw err;
              }
            }

            async function removeLabelIfExists(issueNumber, labelName) {
              try {
                await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: labelName });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            }

            await ensureLabel('ready-to-approve', '0075ca', 'Passes all automated checks — ready for maintainer approval');

            for (const issue of issuesToTriage) {
              const body = issue.body || '';
              const issueNum = issue.number;

            // Parse form fields
            const getField = (label) => {
              const regex = new RegExp(`### ${label}\\s*\\n\\s*([\\s\\S]*?)(?=\\n###|\\n\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };

            const name = getField('Tool Name');
            const github_url = getField('GitHub Repository URL');
            const license = getField('License');
            const labelsToAdd = [];
            let needsAttention = false;

            // Ensure new-tool label is set (may be missing if submitted outside the template)
            const currentLabels = (issue.labels || []).map(l => l.name);
            if (!currentLabels.includes('new-tool')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                labels: ['new-tool'],
              });
              console.log('  🏷️ Added missing new-tool label');
            }

            console.log(`🔍 Triaging: ${name || issue.title} (#${issueNum})`);

            // Check 1: Required fields present
            const author = getField('Your Name');
            const author_github = getField('Your GitHub Username');
            const tagline = getField('One-line description');

            if (!name || !tagline || !github_url || !author || !author_github) {
              console.log('  ⚠️ Missing required fields');
              needsAttention = true;
            }

            // Check 2: GitHub repo accessible
            let repoExists = false;
            let repoData = null;
            let hasReadme = false;
            let hasRepoLicense = false;
            let hasImage = false;

            const repoMatch = github_url.match(/github\.com\/([^/]+)\/([^/\s]+)/);
            if (repoMatch) {
              const [, owner, repo] = repoMatch;
              const repoName = repo.replace(/\/$/, '');

              try {
                const { data } = await github.rest.repos.get({ owner, repo: repoName });
                repoExists = true;
                repoData = data;
                console.log(`  ✅ Repo exists: ${owner}/${repoName} (${data.stargazers_count} ⭐)`);

                // Check for README
                try {
                  await github.rest.repos.getReadme({ owner, repo: repoName });
                  hasReadme = true;
                  console.log('  ✅ README found');
                } catch {
                  console.log('  ⚠️ No README');
                }

                // Check for license via API
                if (data.license && data.license.spdx_id && data.license.spdx_id !== 'NOASSERTION') {
                  hasRepoLicense = true;
                  console.log(`  ✅ License detected: ${data.license.spdx_id}`);
                } else {
                  console.log('  ⚠️ No license detected via API');
                }

                // Check for images in README (potential thumbnail)
                try {
                  const readmeResp = await github.rest.repos.getReadme({
                    owner, repo: repoName,
                    mediaType: { format: 'raw' }
                  });
                  const readme = typeof readmeResp.data === 'string' ? readmeResp.data : '';
                  const imgRegex = /!\[.*?\]\((.*?)\)|<img[^>]+src=["']([^"']+)["']/gi;
                  let match;
                  let imgCount = 0;
                  while ((match = imgRegex.exec(readme)) !== null) {
                    const url = match[1] || match[2];
                    // Skip badges (shields.io, badge URLs, small status images)
                    if (url && !url.includes('shields.io') && !url.includes('badge') && !url.includes('img.shields')) {
                      imgCount++;
                    }
                  }
                  if (imgCount > 0) {
                    hasImage = true;
                    console.log(`  ✅ ${imgCount} non-badge image(s) in README`);
                  } else {
                    console.log('  ⚠️ No images found in README');
                  }
                } catch {
                  console.log('  ⚠️ Could not parse README for images');
                }

              } catch (err) {
                console.log(`  ❌ Repo not accessible: ${err.status || err.message}`);
                needsAttention = true;
              }
            } else {
              console.log('  ❌ No valid GitHub URL found');
              needsAttention = true;
            }

            // Check 3: License in repo (form field alone is not enough — we need an actual LICENSE file)
            const hasFormLicense = license && license.length > 1 && license !== '_No response_';
            const hasLicense = hasRepoLicense;
            if (hasFormLicense && !hasRepoLicense) {
              console.log(`  ⚠️ License "${license}" claimed in form but no LICENSE file detected in repo`);
            }

            // Build label list
            if (repoExists) labelsToAdd.push('repo-verified');
            if (hasLicense) labelsToAdd.push('has-license');
            if (hasReadme) labelsToAdd.push('has-readme');
            if (hasImage) labelsToAdd.push('has-image');

            // Remove stale triage labels that no longer apply
            const triageLabels = ['repo-verified', 'has-license', 'has-readme', 'has-image'];
            for (const label of triageLabels) {
              if (!labelsToAdd.includes(label)) {
                await removeLabelIfExists(issueNum, label);
              }
            }

            if (!repoExists || !hasLicense) {
              needsAttention = true;
            }

            if (needsAttention) {
              labelsToAdd.push('needs-attention');
              await removeLabelIfExists(issueNum, 'ready-to-approve');
            } else {
              labelsToAdd.push('ready-to-approve');
              await removeLabelIfExists(issueNum, 'needs-attention');
            }

            // Apply labels
            if (labelsToAdd.length > 0) {
              console.log(`  🏷️ Adding labels: ${labelsToAdd.join(', ')}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                labels: labelsToAdd
              });
            }

            // Post automated comment for issues needing attention
            if (needsAttention) {
              const commentProblems = [];
              const missingFieldNames = [];
              if (!name) missingFieldNames.push('tool name');
              if (!tagline) missingFieldNames.push('one-line description');
              if (!github_url) missingFieldNames.push('GitHub URL');
              if (!author) missingFieldNames.push('your name');
              if (!author_github) missingFieldNames.push('GitHub username');
              if (missingFieldNames.length > 0) {
                commentProblems.push(`⚠️ **Missing required fields** — please make sure your submission includes: ${missingFieldNames.join(', ')}.`);
              }
              if (!repoExists && github_url) {
                commentProblems.push(`❌ **Repository not accessible** — we couldn't reach \`${github_url}\`. Please make sure it's public and the URL is correct.`);
              } else if (repoExists) {
                if (!hasLicense) {
                  const licenseHint = hasFormLicense
                    ? `You mentioned "${license}" in the submission form, but we couldn't detect a LICENSE file in the repo.`
                    : 'Without a license, the code is technically "all rights reserved" and we can\'t list it as open source.';
                  commentProblems.push(`📄 **No license detected** — ${licenseHint} Please add a \`LICENSE\` file. [MIT License](https://choosealicense.com/licenses/mit/) is a great choice — GitHub makes it easy: go to your repo → **Add file** → **Create new file** → type \`LICENSE\` and GitHub will offer a template picker.`);
                }
                if (!hasReadme) {
                  commentProblems.push('📖 **No README found** — please add a `README.md` so people know what your tool does.');
                }
              }
              if (commentProblems.length > 0) {
                const { data: existingComments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                });
                const alreadyCommented = existingComments.some(c =>
                  c.user.login === 'github-actions[bot]' && c.body.includes('automated checks on your submission')
                );
                if (!alreadyCommented) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNum,
                    body: `👋 Thanks for submitting **${name || 'your tool'}** to Tiny Tool Town!\n\nWe ran some automated checks on your submission and found a few things to address before we can approve it:\n\n${commentProblems.map(p => `- ${p}`).join('\n')}\n\nOnce you've made the updates, just let us know here and we'll take another look! 🏘️`,
                  });
                }
              }
            }

            // Friendly nudge for tools without images (non-blocking)
            if (repoExists && !hasImage && !needsAttention) {
              const { data: existingComments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
              });
              const alreadyNudged = existingComments.some(c =>
                c.user.login === 'github-actions[bot]' && c.body.includes('screenshot or demo image')
              );
              if (!alreadyNudged) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  body: `✅ **${name || 'Your tool'}** looks good and is ready for review!\n\n💡 **Tip:** Tools with a screenshot or demo image in their README tend to get more attention on the site. Even for CLI tools, a terminal screenshot, a colorful output example, or an architecture diagram can make your page really pop. Consider adding one if you haven't already!\n\nNo action needed — this is just a friendly suggestion. 🏘️`,
                });
              }
            }

            // Log summary
            console.log('\n══════════════════════════════════');
            console.log(`  Tool: ${name || 'unknown'}`);
            console.log(`  Repo: ${repoExists ? '✅' : '❌'} | License: ${hasLicense ? '✅' : '❌'} | README: ${hasReadme ? '✅' : '❌'} | Image: ${hasImage ? '✅' : '❌'}`);
            console.log(`  Needs attention: ${needsAttention}`);
            console.log('══════════════════════════════════');
            } // end for loop

